<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #F4EEE3;
    --bg-soft: #EFE6D6;
    --card: #FAF5EA;
    --card-highlight: #F2DFC4;
    --ink: #1C1814;
    --ink-soft: #3A332C;
    --muted: #8A8074;
    --hairline: rgba(28, 24, 20, 0.10);
    --hairline-soft: rgba(28, 24, 20, 0.06);
    --accent: #E55A3C;
    --accent-soft: #F18F76;

    --font-display: 'Geist', 'Inter', system-ui, sans-serif;
    --font-body: 'Inter', system-ui, sans-serif;
    --font-serif: 'Instrument Serif', 'Fraunces', Georgia, serif;

    --section-py: clamp(80px, 10vw, 140px);
    --container-px: clamp(20px, 4vw, 56px);
    --container-max: 1320px;

    --radius-sm: 10px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 32px;

    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;
    font-feature-settings: "ss01", "cv11";
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.11 0 0 0 0 0.09 0 0 0 0 0.08 0 0 0 0 0.06 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.5;
    mix-blend-mode: multiply;
    z-index: 1;
  }

  #root { position: relative; z-index: 2; }

  ::selection { background: var(--accent); color: var(--bg); }

  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  a { color: inherit; text-decoration: none; }

  .reveal {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.9s var(--ease), transform 0.9s var(--ease);
  }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .reveal-delay-1 { transition-delay: 0.08s; }
  .reveal-delay-2 { transition-delay: 0.16s; }
  .reveal-delay-3 { transition-delay: 0.24s; }
  .reveal-delay-4 { transition-delay: 0.32s; }
  .reveal-delay-5 { transition-delay: 0.40s; }

  @media (prefers-reduced-motion: reduce) {
    .reveal { opacity: 1; transform: none; transition: none; }
    html { scroll-behavior: auto; }
  }

  /* Image slot placeholder */
  .img-slot {
    background: var(--bg-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
    text-align: center;
    padding: 16px;

</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>

<script type="text/babel">

const IconChart = () => (

// ─── Primitives ───────────────────────────────────────────────
const Container = ({ children, style, className }) => (
  <div className={className} style={{
    maxWidth: 'var(--container-max)',
    margin: '0 auto',
    paddingLeft: 'var(--container-px)',
    paddingRight: 'var(--container-px)',
    position: 'relative',
    ...style
  }}>{children}</div>
);

const Eyebrow = ({ children, dark }) => (
  <div style={{
    display: 'inline-flex', alignItems: 'center', gap: 10,
    fontSize: 12, letterSpacing: '0.18em', textTransform: 'uppercase',
    fontWeight: 500, color: dark ? 'rgba(244,238,227,0.65)' : 'var(--muted)'
  }}>
    <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--accent)', flexShrink: 0 }} />
    {children}
  </div>
);

const MagneticButton = ({ children, primary, dark, href = '#', onClick, style }) => {
  const ref = useRef(null);
  const [pos, setPos] = useState({ x: 0, y: 0 });
  const handleMove = (e) => {
    const el = ref.current; if (!el) return;
    const r = el.getBoundingClientRect();
    setPos({ x: (e.clientX - r.left - r.width / 2) * 0.25, y: (e.clientY - r.top - r.height / 2) * 0.35 });
  };
  const handleLeave = () => setPos({ x: 0, y: 0 });
  const bg = primary ? 'var(--accent)' : dark ? 'var(--ink)' : 'transparent';
  const color = primary ? '#FFF7F0' : dark ? 'var(--bg)' : 'var(--ink)';
  const border = primary || dark ? 'transparent' : 'var(--hairline)';
  return (
    <a ref={ref} href={href} onClick={onClick} onMouseMove={handleMove} onMouseLeave={handleLeave}
      style={{
        display: 'inline-flex', alignItems: 'center', gap: 10,
        padding: '15px 24px', borderRadius: 999,
        background: bg, color, fontSize: 14, fontWeight: 500, letterSpacing: '-0.005em',
        border: `1px solid ${border}`,
        transform: `translate(${pos.x}px, ${pos.y}px)`,
        transition: 'transform 0.4s var(--ease), background 0.3s, color 0.3s',
        willChange: 'transform', ...style
      }}>
      {children}
    </a>
  );
};

const Logo = () => (
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
    <rect x="3" y="3" width="10" height="10" rx="2" fill="var(--ink)" />
    <rect x="15" y="3" width="10" height="10" rx="2" fill="var(--accent)" />
    <rect x="3" y="15" width="10" height="10" rx="2" fill="var(--accent)" />
    <rect x="15" y="15" width="10" height="10" rx="2" fill="var(--ink)" />
  </svg>
);

const ImgSlot = ({ placeholder, style }) => (
  <div className="img-slot" style={{ width: '100%', height: '100%', ...style }}>
    {placeholder}
  </div>
);

const useReveal = () => {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { threshold: 0, rootMargin: '0px 0px -10% 0px' });
    const nodes = el.querySelectorAll('.reveal');
    nodes.forEach((n) => {
      if (n.getBoundingClientRect().top < window.innerHeight * 0.95) n.classList.add('in');
      else io.observe(n);
    });
    return () => io.disconnect();
  }, []);
  return ref;
};

// ─── Rotating Word ────────────────────────────────────────────
const RotatingWord = ({ words }) => {
  const [idx, setIdx] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setIdx(i => (i + 1) % words.length), 2400);
    return () => clearInterval(id);
  }, [words.length]);
  return (
    <span style={{ position: 'relative', display: 'inline-block', verticalAlign: 'baseline', whiteSpace: 'nowrap' }}>
      <span aria-hidden="true" style={{ visibility: 'hidden', display: 'inline-block' }}>
        {words.reduce((a, b) => (a.length > b.length ? a : b), '')}
      </span>
      {words.map((w, i) => (
        <span key={i} style={{
          position: 'absolute', left: 0, top: 0,
          fontFamily: 'var(--font-serif)', fontStyle: 'italic', fontWeight: 400, color: 'var(--accent)',
          opacity: idx === i ? 1 : 0,
          transform: idx === i ? 'translateY(0)' : 'translateY(0.25em)',
          transition: 'opacity 0.55s var(--ease), transform 0.55s var(--ease)',
        }}>{w}.</span>
      ))}
    </span>
  );
};

        onMouseOut={e => e.currentTarget.style.opacity = '0.65'}>

};

// ─── Nav ──────────────────────────────────────────────────────

// ─── Custom Cursor ────────────────────────────────────────────
const CustomCursor = () => {
  const dotRef = useRef(null);
  const ringRef = useRef(null);
  useEffect(() => {
    if (window.matchMedia('(pointer: coarse)').matches) return;
    let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0, rafId;
    const onMove = (e) => {
      mouseX = e.clientX; mouseY = e.clientY;
      if (dotRef.current) dotRef.current.style.transform = `translate3d(${mouseX - 3}px, ${mouseY - 3}px, 0)`;
    };
    const tick = () => {
      ringX += (mouseX - ringX) * 0.18; ringY += (mouseY - ringY) * 0.18;
      if (ringRef.current) ringRef.current.style.transform = `translate3d(${ringX - 16}px, ${ringY - 16}px, 0)`;
      rafId = requestAnimationFrame(tick);
    };
    tick();
    const onOver = (e) => {
      const t = e.target.closest('a, button, [data-cursor]');
      if (ringRef.current) {
        if (t) { ringRef.current.style.width = '52px'; ringRef.current.style.height = '52px'; ringRef.current.style.marginLeft = '-10px'; ringRef.current.style.marginTop = '-10px'; ringRef.current.style.borderColor = 'var(--accent)'; ringRef.current.style.background = 'rgba(229,90,60,0.06)'; }
        else { ringRef.current.style.width = '32px'; ringRef.current.style.height = '32px'; ringRef.current.style.marginLeft = '0'; ringRef.current.style.marginTop = '0'; ringRef.current.style.borderColor = 'var(--ink)'; ringRef.current.style.background = 'transparent'; }
      }
    };
    window.addEventListener('mousemove', onMove);
    document.addEventListener('mouseover', onOver);
    return () => { cancelAnimationFrame(rafId); window.removeEventListener('mousemove', onMove); document.removeEventListener('mouseover', onOver); };
  }, []);
  return (
    <>
      <style>{`@media (pointer: fine) { body { cursor: none; } a, button, [data-cursor] { cursor: none !important; } } @media (pointer: coarse) { .custom-cursor { display: none !important; } }`}</style>
      <div ref={dotRef} className="custom-cursor" style={{ position: 'fixed', top: 0, left: 0, width: 6, height: 6, borderRadius: '50%', background: 'var(--accent)', pointerEvents: 'none', zIndex: 9999, willChange: 'transform' }} />
      <div ref={ringRef} className="custom-cursor" style={{ position: 'fixed', top: 0, left: 0, width: 32, height: 32, borderRadius: '50%', border: '1.5px solid var(--ink)', pointerEvents: 'none', zIndex: 9998, willChange: 'transform, width, height', transition: 'width 0.3s var(--ease), height 0.3s var(--ease), border-color 0.3s, background 0.3s, margin 0.3s var(--ease)', mixBlendMode: 'difference', opacity: 0.55 }} />
    </>
  );
};
